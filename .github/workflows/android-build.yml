name: Build Android APK

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          
      - name: Install dependencies
        run: |
          cd app
          npm install
          
      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'
          
      - name: Grant execute permission for gradlew
        run: |
          cd app/android
          chmod +x gradlew
          
      - name: Build Android Debug APK
        run: |
          cd app/android
          ./gradlew assembleDebug
          
      - name: Rename APK
        run: |
          mv app/android/app/build/outputs/apk/debug/app-debug.apk app/android/app/build/outputs/apk/debug/luckyyum-latest.apk

      - name: Create Release and Upload APK
        uses: softprops/action-gh-release@v1
        with:
          tag_name: latest
          name: Latest Build
          files: app/android/app/build/outputs/apk/debug/luckyyum-latest.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
