services:
  redis:
    image: redis:7-alpine
    container_name: luckyyum_redis
    command: redis-server --maxmemory 512mb --maxmemory-policy allkeys-lru --appendonly yes
    ports:
      - "6380:6379"
    volumes:
      - redisdata:/data
    networks:
      - luckyyum_network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  db:
    image: postgres:15-alpine
    container_name: luckyyum_db
    environment:
      POSTGRES_USER: luckyyum
      POSTGRES_PASSWORD: luckyyum_password
      POSTGRES_DB: luckyyum_db
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - luckyyum_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U luckyyum"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    container_name: luckyyum_backend
    ports:
      - "8003:8000"
    volumes:
      - ./backend:/app
      - /app/.venv
    command: /app/.venv/bin/uvicorn app.main:app --host 0.0.0.0 --port 8000
    env_file:
      - .env
    depends_on:
      redis:
        condition: service_healthy
      db:
        condition: service_healthy
    environment:
      - TZ=Asia/Seoul
      - PATH=/app/.venv/bin:$$PATH
    networks:
      luckyyum_network:
      shared-network:
        ipv4_address: 172.18.0.101
        aliases:
          - luckyyum-be
    healthcheck:
      test: ["CMD", "/app/.venv/bin/python", "-c",
             "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 10s
      retries: 3

volumes:
  redisdata:
  pgdata:

networks:
  luckyyum_network: {}
  shared-network:
    external: true
